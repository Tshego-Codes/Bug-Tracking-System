<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Projects - Bug Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="master_styles.css">
    <script src="app2.js" defer></script>
</head>

<body>
    <nav class="nav-container">
        <div class="linear-nav">
            <div class="nav-wrapper">
                <!-- Logo -->
                <div class="nav-logo">
                    <div class="logo-icon">
                        <i class="fas fa-bug"></i>
                    </div>
                    <a href="home.html" class="logo-text">BugTracker</a>
                </div>

                <!-- Center Links - LIKE LINEAR -->

                <div class="nav-links">
                    <a href="home.html" class="nav-link" id="navDashboard">Dashboard</a>
                    <a href="issue_tracker.html" class="nav-link" id="navIssues">Tickets</a>
                    <a href="people.html" class="nav-link" id="navPeople">People</a>
                    <a href="project.html" class="nav-link" id="navProjects">Projects</a>
                </div>
                
                <!--hidden--> 
                <div></div>
            </div>
        </div>    
    </nav>

    <div class="form-content-wrapper">
        <div class="form-content">
            <div class="card">
                <h3 class="card-header bg-success">
                    Add a New Project
                </h3>
                <div class="card-body">
                    <form id="projectForm">
                        <div class="mb-3">
                            <label class="form-label">Project Name</label>
                            <input type="text" id="projectName" class="form-control" placeholder="Enter project name"
                                required>
                        </div>
                        <button type="button" class="btn btn-success" onclick="addProjectFromPage()">Save Project</button>
                        <button type="button" class="btn btn-secondary" onclick="clearForm()">Clear</button>
                    </form>
                </div>
            </div>

            <div class="card">
                <h3 class="card-header bg-success">
                    List of Projects
                </h3>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Project Name</th>
                                    <th>Project ID</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="projectsTable">
                                <tr>
                                    <td colspan="3" class="text-center">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <aside class="form-actions">
            <h3>Quick Actions </h3>
                <button class="form-action-button" onclick="window.location.href='people.html'">
                    <i class="fa fa-user quick-action-icon" aria-hidden="true"></i>
                    <div class="form-action-text">Manage People</div>
                </button>
                <button class="form-action-button" onclick="window.location.href='people.html'">
                    <i class="fa fa-tasks quick-action-icon" aria-hidden="true"></i>
                    <div class="form-action-text">Manage Projects</div>
                </button>
        </aside>
    </div>




    <footer>
        <p>Bug Tracking System - Project Management</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage People - Bug Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="master_styles.css">
    <script src="app2.js" defer></script>
</head>

<body>
    <nav class="nav-container">
        <div class="linear-nav">
            <div class="nav-wrapper">
                <!-- Logo -->
                <div class="nav-logo">
                    <div class="logo-icon">
                        <i class="fas fa-bug"></i>
                    </div>
                    <a href="home.html" class="logo-text">BugTracker</a>
                </div>

                <!-- Center Links - LIKE LINEAR -->

                <div class="nav-links">
                    <a href="home.html" class="nav-link" id="navDashboard">Dashboard</a>
                    <a href="issue_tracker.html" class="nav-link" id="navIssues">Tickets</a>
                    <a href="people.html" class="nav-link" id="navPeople">People</a>
                    <a href="project.html" class="nav-link" id="navProjects">Projects</a>
                </div>

                <!--hidden-->
                <div></div>
            </div>
        </div>
    </nav>

    <div class="form-content-wrapper">

        <div class="form-content">
            <div class="card">
                <h3 class="card-header bg-primary">
                    Add a New Person
                </h3>
                <div class="card-body">
                    <form id="personForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" id="firstName" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Surname</label>
                                <input type="text" id="surname" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="addPersonFromPage()">Save Person</button>
                        <button type="button" class="btn btn-secondary" onclick="clearForm()">Clear</button>
                    </form>
                </div>
                <div class="card">
                    <h3 class="card-header bg-primary">
                        List of People
                    </h3>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>Full Name</th>
                                        <th>Email</th>
                                        <th>Username</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="peopleTable">
                                    <tr>
                                        <td colspan="4" class="text-center">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <aside class="form-actions">
            <h3>Quick Actions </h3>
            <button class="form-action-button" onclick="window.location.href='people.html'">
                <i class="fa fa-user quick-action-icon" aria-hidden="true"></i>
                <div class="form-action-text">Manage People</div>
            </button>
            <button class="form-action-button" onclick="window.location.href='project.html'">
                <i class="fa fa-tasks quick-action-icon" aria-hidden="true"></i>
                <div class="form-action-text">Manage Projects</div>
            </button>
        </aside>
    </div>

    <footer>
        <p>Bug Tracking System - People Management</p>
    </footer>
</body>

</html>

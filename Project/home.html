<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.netpm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="master_styles.css">
    <script src="app2.js" defer></script>
</head>
<body>
    <nav class="nav-container">
        <div class="linear-nav">
            <div class="nav-wrapper">
                <!-- Logo -->
                <div class="nav-logo">
                    <a href="home.html"></a>
                    <div class="logo-icon">
                        <i class="fas fa-bug"></i>
                    </div>
                    <a href="home.html" class="logo-text">BugTracker</a>
                </div>

                <!-- Center Links - LIKE LINEAR -->

                <div class="nav-links">
                    <a href="home.html" class="nav-link" id="navDashboard">Dashboard</a>
                    <a href="issue_tracker.html" class="nav-link" id="navIssues">Tickets</a>
                    <a href="people.html" class="nav-link" id="navPeople">People</a>
                    <a href="project.html" class="nav-link" id="navProjects">Projects</a>
                </div>
                
                <!--hidden--> 
                <div></div>
            </div>
        </div>    
    </nav>
    
    <!-- HERO -->
    <div class="hero-section">
        <h1 class="hero-title">BugTracker Dashboard</h1>
        <p class="hero-subtitle">Track, manage, and resolve issues efficiently</p>
    </div>

    <!--DASH BOARD STATS-->

    <div class="layout">
        <main class="main-section dash-card">
            <h2 class="dash-title">Summary of Tickets</h2>
            <div class="stats-bar home-stats-bar" id="stats-bar"></div>

            <h2 class="dash-title">Summary of People and Projects</h2>
            <div class="stats-bar" id="people-project-stats"></div>
        </main>

        <aside class="quick-actions-container dash-card">
                <h2 class="dash-title">Quick Actions</h2>

                <button class="quick-action-button" onclick="openCreate()">
                    <i class="fa fa-ticket quick-action-icon" aria-hidden="true"></i>
                    <div class="quick-action-text">Add New Ticket</div>
                </button>

                <button class="quick-action-button" onclick="window.location.href='people.html'">
                    <i class="fa fa-user quick-action-icon" aria-hidden="true"></i>
                    <div class="quick-action-text">Add New Person</div>
                </button>

                <button class="quick-action-button" onclick="window.location.href='project.html'">
                    <i class="fa fa-tasks quick-action-icon" aria-hidden="true"></i>
                    <div class="quick-action-text">Add New Project</div>
                </button>
        </aside>
    </div>
     

</div>
    <!-- Modal -->
    <div id="modal-bg" class="modal-bg" style="display:none" onclick="bgClose(event)">
    <div class="modal" id="modal-box"></div>
    </div>     
</body>
</html>
